// ── DB status ────────────────────────────────────────────────────────────────
function dbStatus(state, msg) {
  const el = document.getElementById("db-status");
  el.className = `db-status db-${state}`;
  el.textContent = msg;
}

// ── Seed if empty ────────────────────────────────────────────────────────────
async function seedIfEmpty() {
  const existing = await sb("entities?select=id&limit=1");
  if (existing.length > 0) return false; // already has data

  // Seed account_holders
  await sb("account_holders", { method: "POST", body: JSON.stringify(SEED_HOLDERS) });

  // Seed entities
  await sb("entities", { method: "POST", body: JSON.stringify(SEED_ENTITIES) });

  // Seed transactions
  const txnRows = [];
  for (const [entityId, rows] of Object.entries(SEED_TXN)) {
    for (const r of rows) {
      txnRows.push({
        id: r[0], entity_id: entityId, date: r[1], direction: r[2],
        issuer: r[3], issuer_iban: r[4], receiver: r[5], receiver_iban: r[6],
        amount: r[7], currency: r[8], reference: r[9], status: r[10], type: r[11]
      });
    }
  }
  await sb("transactions", { method: "POST", body: JSON.stringify(txnRows) });
  return true;
}

// ── Load from DB ─────────────────────────────────────────────────────────────
async function loadFromDB() {
  const [entities, transactions, aiResults] = await Promise.all([
    sb("entities?select=*"),
    sb("transactions?select=*&order=date.asc"),
    sb("ai_results?select=*")
  ]);

  // Build ENTITIES map
  ENTITIES = {};
  for (const e of entities) {
    ENTITIES[e.id] = {
      id: e.id, type: e.type, name: e.name, accountId: e.account_id,
      email: e.email, phone: e.phone, ibanCountry: e.iban_country,
      address: e.address, addressCountry: e.address_country,
      joined: e.joined, businessType: e.business_type,
      monthlyThreshold: e.monthly_threshold, holder: e.holder_id,
      owns: entities.filter(x => x.holder_id === e.id).map(x => x.id)
    };
  }

  // Build TXN_DATA map
  TXN_DATA = {};
  for (const t of transactions) {
    if (!TXN_DATA[t.entity_id]) TXN_DATA[t.entity_id] = [];
    TXN_DATA[t.entity_id].push(t);
  }

  // Build AI cache
  aiCache = {};
  for (const r of aiResults) {
    aiCache[r.transaction_id] = r;
  }
}

// ── Save AI result ────────────────────────────────────────────────────────────
async function saveAIResult(txnId, ai) {
  const row = {
    transaction_id: txnId,
    risk_level: ai.risk_level,
    risk_score: ai.risk_score,
    summary: ai.summary,
    typologies: ai.typologies,
    red_flags: ai.red_flags,
    profile_inconsistencies: ai.profile_inconsistencies,
    recommended_action: ai.recommended_action,
    sar_narrative: ai.sar_narrative
  };
  try {
    // Upsert by transaction_id
    const existing = await sb(`ai_results?transaction_id=eq.${txnId}&select=id`);
    if (existing.length > 0) {
      await sb(`ai_results?id=eq.${existing[0].id}`, { method: "PATCH", body: JSON.stringify(row) });
    } else {
      await sb("ai_results", { method: "POST", body: JSON.stringify(row) });
    }
    aiCache[txnId] = row;
  } catch(e) { console.warn("Could not save AI result:", e); }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function toObj(t, i) {
  return {
    _id: i, id: t.id, date: t.date, dir: t.direction,
    issuer: t.issuer, issuerIban: t.issuer_iban,
    receiver: t.receiver, receiverIban: t.receiver_iban,
    amount: parseFloat(t.amount), currency: t.currency,
    ref: t.reference, status: t.status, type: t.type
  };
}
function ibanCountry(iban) { if(!iban||iban.startsWith("ATM"))return"ATM"; return iban.replace(/\s/g,"").toUpperCase().slice(0,2); }
function flag(code) { if(!code||code.length!==2)return""; if(code==="ATM")return"🏧"; try{const b=0x1F1E6-65;return String.fromCodePoint(b+code.charCodeAt(0))+String.fromCodePoint(b+code.charCodeAt(1));}catch{return"";} }
function phoneFlag(phone) { const m={"+7":"RU","+44":"GB","+1":"US","+49":"DE","+33":"FR","+31":"NL","+971":"AE"}; for(const[p,c]of Object.entries(m))if(phone.startsWith(p))return c; return null; }
function cpIban(t) { return t.dir==="OUT"?t.receiverIban:t.issuerIban; }
function risk(t) { const c=ibanCountry(cpIban(t)); if(SANCTIONS.includes(c))return"critical"; if(HIGH_RISK.includes(c))return"high"; if(t.amount>=9000&&t.amount<=10500)return"high"; if(t.amount>50000)return"medium"; return"low"; }
function filterByMonths(txns, months) { if(!months)return txns; const c=new Date("2024-08-31"); c.setMonth(c.getMonth()-months); return txns.filter(t=>new Date(t.date)>=c); }
function fmt(n) { return "€"+Number(n).toLocaleString(); }
function riskBorder(r) { return{critical:"#7f1d1d",high:"#78350f",medium:"#1e3a5f",low:"#14532d"}[r]||"#30363d"; }
function riskBg(r) { return{critical:"#2a1015",high:"#1f1508",medium:"#0f1929",low:"#071510"}[r]||"#161b22"; }

function setOvTimeline(v) { overviewTimeline = v; renderHeader(); runOverview(); }
function toggleOverview() {

  else{el.classList.remove("collapsed");a.innerHTML="▾";l.textContent="Hide";}
}
function scrollToTransactions() { document.getElementById("txn-section").scrollIntoView({behavior:"smooth"}); }

async function runOverview() {
  const body = document.getElementById("overview-body"); if(!body)return;
  body.innerHTML = '<span class="overview-placeholder">Analyzing transactions...</span>';
  const e = ENTITIES[currentEntity];
  const txns = filterByMonths(TXN, overviewTimeline);
  if(!txns.length){body.innerHTML='<span class="overview-placeholder">No transactions in selected period.</span>';return;}
  const tin=txns.filter(t=>t.dir==="IN").reduce((s,t)=>s+t.amount,0);
  const tout=txns.filter(t=>t.dir==="OUT").reduce((s,t)=>s+t.amount,0);
  const sanc=txns.filter(t=>SANCTIONS.includes(ibanCountry(cpIban(t))));
  const hr=txns.filter(t=>HIGH_RISK.includes(ibanCountry(cpIban(t))));
  const stru=txns.filter(t=>t.amount>=9000&&t.amount<=10500);
  const cc={}; txns.forEach(t=>{const c=ibanCountry(cpIban(t));if(c&&c!=="ATM")cc[c]=(cc[c]||0)+1;});
  const topC=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([c,n])=>`${COUNTRY[c]||c}(${n}${SANCTIONS.includes(c)?" SANCTIONED":HIGH_RISK.includes(c)?" HIGH-RISK":""})`).join(", ");
  const prompt=`You are a senior AML analyst reviewing a ${e.type} account.\nEntity: ${e.name} (${e.businessType}) | Type: ${e.type}\nPeriod: last ${overviewTimeline||"all"} month(s) | Transactions: ${txns.length} | IN: €${tin.toLocaleString()} | OUT: €${tout.toLocaleString()}\nSanctioned hits: ${sanc.length} | High-risk hits: ${hr.length} | Near-threshold: ${stru.length}\nJurisdictions: ${topC}\nTransactions:\n${txns.map(t=>`${t.id}|${t.dir}|${t.amount}${t.currency}|${t.issuer}->${t.receiver}|${ibanCountry(cpIban(t))}|${t.ref}`).join("\n")}\nWrite a focused 4-5 sentence AML risk narrative covering transaction patterns, jurisdictions of concern, typologies, and overall risk conclusion. Professional compliance language, plain text only.`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:500,messages:[{role:"user",content:prompt}]})});
    const data = await res.json();
    const text = data.content?.map(b=>b.text||"").join("")||"";
    body.innerHTML = `<span style="font-size:12px;color:#8b949e;line-height:1.9">${text}</span>`;
    const sb2 = document.getElementById("scroll-txn-btn"); if(sb2) sb2.classList.add("visible");
  } catch { body.innerHTML='<span style="color:#fca5a5;font-size:11px">⚠ Analysis failed — API key required for AI features</span>'; }
}

function getFiltered() {
  const p=document.getElementById("sel-period").value, d=document.getElementById("sel-dir").value, rf=document.getElementById("sel-risk").value, q=document.getElementById("search").value.toLowerCase();
  let txns = filterByMonths(TXN, p ? parseInt(p) : null);
  if(d) txns=txns.filter(t=>t.dir===d);
  if(rf) txns=txns.filter(t=>risk(t)===rf);
  if(q) txns=txns.filter(t=>[t.id,t.issuer,t.issuerIban,t.receiver,t.receiverIban,t.ref,t.dir,t.status].some(v=>String(v||"").toLowerCase().includes(q)));
  return txns;
}

function renderTable() {
  document.getElementById("thead-row").innerHTML = ["Risk","Date","ID","In/Out","Issuer","Receiver","Amount","Country","Reference"].map(c=>`<th>${c}</th>`).join("");
  const txns = getFiltered();
  document.getElementById("txn-count").textContent = `${txns.length} TRANSACTION${txns.length!==1?"S":""}`;
  document.getElementById("tbody").innerHTML = txns.map(t => {
    const r=risk(t), cc=ibanCountry(cpIban(t)), isATM=t.type==="atm", sel=selectedId===t._id, col=t.dir==="OUT"?"#fca5a5":"#4ade80";
    const hasSaved = !!aiCache[t.id];
    return `<tr class="txn-row${sel?" selected":""}" onclick="selectTxn(${t._id})" style="border-left:2px solid ${riskBorder(r)}"><td><span class="badge badge-${r}">${r}</span></td><td style="color:#6e7681;font-size:10px">${t.date.slice(0,16)}</td><td style="color:#58a6ff">${t.id}${hasSaved?'<span class="saved-badge">AI</span>':''}</td><td style="color:${col};font-weight:700">${t.dir}</td><td>${t.issuer.slice(0,18)}</td><td>${t.receiver.slice(0,18)}</td><td style="color:${col};font-weight:700">${t.dir==="OUT"?"−":"+"}€${t.amount.toLocaleString()}</td><td style="font-size:12px">${isATM?"🏧 ATM":`${flag(cc)} ${cc}`}</td><td style="color:#6e7681;font-size:10px">${t.ref.slice(0,16)}</td></tr>`;
  }).join("");
}

function selectTxn(id) {
  selectedId = id; renderTable();
  const t = TXN.find(x=>x._id===id); if(!t)return;
  document.getElementById("left").className = "left split";
  const right = document.getElementById("right"); right.style.display = "block";
  const cib=cpIban(t), cc=ibanCountry(cib);
  const isS=SANCTIONS.includes(cc), isH=HIGH_RISK.includes(cc), isStr=t.amount>=9000&&t.amount<=10500, isATM=t.type==="atm";
  const same=TXN.filter(x=>cpIban(x)===cib&&x._id!==id&&!isATM);
  const iC=ibanCountry(t.issuerIban), rC=ibanCountry(t.receiverIban);
  let flags="";
  if(isS) flags+=`<div class="flag-box flag-critical">🚨 <strong>Sanctioned country</strong> — ${COUNTRY[cc]||cc} (${cc})</div>`;
  if(isH&&!isS) flags+=`<div class="flag-box flag-high">⚠️ <strong>High-risk jurisdiction</strong> — ${COUNTRY[cc]||cc}</div>`;
  if(isStr) flags+=`<div class="flag-box flag-high">⚠️ <strong>Structuring risk</strong> — €${t.amount.toLocaleString()} near €10,000 threshold</div>`;
  if(isATM) flags+=`<div class="flag-box flag-medium">🏧 <strong>ATM cash transaction</strong> — verify consistency with profile</div>`;
  if(same.length>0) flags+=`<div class="flag-box flag-medium">🔗 <strong>Cross-case IBAN</strong> — appears in ${same.length} other transaction${same.length>1?"s":""}</div>`;
  if(!flags) flags=`<div class="flag-box flag-low">✓ No automatic flags triggered</div>`;
  const cross=same.length>0?`<div class="cross-box"><div class="cross-title">🔗 Same IBAN — other transactions</div>${same.map(x=>`<div class="cross-row"><span style="color:#58a6ff">${x.id}</span><span style="color:${x.dir==="OUT"?"#fca5a5":"#4ade80"}">${x.dir} €${x.amount.toLocaleString()}</span></div>`).join("")}</div>`:"";
  const iTag=SANCTIONS.includes(iC)?`<span class="badge badge-critical" style="margin-left:6px">sanctioned</span>`:HIGH_RISK.includes(iC)?`<span class="badge badge-high" style="margin-left:6px">shell zone</span>`:"";
  const rTag=SANCTIONS.includes(rC)?`<span class="badge badge-critical" style="margin-left:6px">sanctioned</span>`:HIGH_RISK.includes(rC)?`<span class="badge badge-high" style="margin-left:6px">shell zone</span>`:"";

  // Check for saved AI result
  const saved = aiCache[t.id];
  const aiSection = saved ? renderAIOutput(t._id, saved) : `<div class="sec"><button class="ai-btn" id="ai-btn-${t._id}" onclick="runAI(${t._id})">⬡ Run AI Risk Analysis</button></div><div id="ai-result-${t._id}"></div>`;

  right.innerHTML = `<div class="detail-head"><div><div style="font-size:13px;font-weight:700;color:#e6edf3">${t.id}</div><div style="font-size:10px;color:#484f58;margin-top:2px">${t.date} · <span style="color:${t.dir==="OUT"?"#fca5a5":"#4ade80"}">${t.dir}</span></div></div><button class="close-btn" onclick="closeDetail()">&times;</button></div><div class="sec"><div class="sec-label">Automatic flags</div>${flags}</div><div class="sec"><div class="sec-label">Issuer</div><div class="field-val">${t.issuer}</div><div class="iban-box">${t.issuerIban}</div>${!isATM?`<div style="margin-top:5px;font-size:11px;color:#8b949e">${flag(iC)} ${COUNTRY[iC]||iC}${iTag}</div>`:""}</div><div class="sec"><div class="sec-label">Receiver</div><div class="field-val">${t.receiver}</div><div class="iban-box">${t.receiverIban}</div>${!isATM?`<div style="margin-top:5px;font-size:11px;color:#8b949e">${flag(rC)} ${COUNTRY[rC]||rC}${rTag}</div>`:""}${cross}</div><div class="sec"><div class="sec-label">Transaction details</div><div class="grid2"><div><div class="field-label">Amount</div><div style="font-size:14px;font-weight:700;color:${t.dir==="OUT"?"#fca5a5":"#4ade80"}">${t.dir==="OUT"?"−":"+"}€${t.amount.toLocaleString()} ${t.currency}</div></div><div><div class="field-label">Status</div><div class="field-val">${t.status}</div></div><div style="grid-column:1/-1"><div class="field-label">Reference</div><div style="font-size:12px;color:#8b949e">${t.ref}</div></div></div></div>${aiSection}`;
}

function renderAIOutput(localId, ai) {
  const r = ai.risk_level || "medium";
  const esc = (ai.recommended_action||"").includes("Escalate");
  const typologies = Array.isArray(ai.typologies) ? ai.typologies : [];
  const redFlags = Array.isArray(ai.red_flags) ? ai.red_flags : [];
  const inconsistencies = Array.isArray(ai.profile_inconsistencies) ? ai.profile_inconsistencies : [];
  const sarText = (ai.sar_narrative||"").replace(/`/g,"'");
  return `<div class="sec" style="border:none"><button class="ai-btn" style="opacity:.6;font-size:10px;margin-bottom:8px" onclick="runAI(${localId})">↺ Re-run AI Analysis</button></div>
  ${esc?`<div style="padding:0 15px"><div class="sar-banner"><span style="font-size:16px">🚨</span><div><div style="font-size:11px;font-weight:700;color:#fca5a5;margin-bottom:2px">SAR Filing Recommended — Escalate to MLRO</div><div style="font-size:10px;color:#f87171">${typologies.join(" · ")}</div></div></div></div>`:""}
  <div class="ai-section"><div class="ai-card" style="background:${riskBg(r)};border:1px solid ${riskBorder(r)}"><div class="ai-label">Risk assessment <span style="color:#4ade80;font-size:8px;font-weight:400;letter-spacing:0;text-transform:none">● saved</span></div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span class="badge badge-${r}">${r}</span><span style="font-size:10px;color:#6e7681">Score: ${ai.risk_score}/100</span></div><div class="score-bar"><div style="height:100%;width:${ai.risk_score}%;background:${ai.risk_score>70?"#991b1b":ai.risk_score>40?"#92400e":"#15803d"}"></div></div><div style="font-size:12px;color:#c9d1d9;line-height:1.75;margin-top:8px">${ai.summary}</div></div>
  ${inconsistencies.length?`<div style="margin-bottom:8px"><div class="ai-label">Profile inconsistencies</div>${inconsistencies.map(f=>`<div class="inconsistency"><span>▸</span><span>${f}</span></div>`).join("")}</div>`:""}
  ${typologies.length?`<div style="margin-bottom:8px"><div class="ai-label">AML typologies</div>${typologies.map(x=>`<span class="tag">${x}</span>`).join("")}</div>`:""}
  ${redFlags.length?`<div style="margin-bottom:8px"><div class="ai-label">Red flags</div>${redFlags.map(f=>`<div class="red-flag"><span>▸</span><span>${f}</span></div>`).join("")}</div>`:""}
  ${ai.recommended_action?`<div style="margin-bottom:8px"><div class="ai-label">Recommended action</div><div style="font-size:13px;font-weight:700;color:${esc?"#fca5a5":(ai.recommended_action.includes("Request")?"#fbbf24":"#4ade80")}">${ai.recommended_action}</div></div>`:""}
  ${ai.sar_narrative?`<div><div class="ai-label">SAR narrative draft</div><div class="sar-box">${ai.sar_narrative}</div><button class="copy-btn" onclick="navigator.clipboard.writeText(\`${sarText}\`)">copy to clipboard</button></div>`:""}</div>`;
}

function closeDetail() {
  selectedId = null;
  document.getElementById("left").className = "left full";
  const r = document.getElementById("right"); r.style.display = "none"; r.innerHTML = "";
  renderTable();
}

async function runAI(id) {
  const t = TXN.find(x=>x._id===id);
  const right = document.getElementById("right");
  const btnEl = right.querySelector(".ai-btn");
  const rdEl = right.querySelector(`#ai-result-${id}`);
  if(btnEl){btnEl.disabled=true;btnEl.textContent="⟳ Analyzing...";}
  if(rdEl) rdEl.innerHTML="";
  const e=ENTITIES[currentEntity], cib=cpIban(t), cc=ibanCountry(cib);
  const same=TXN.filter(x=>cpIban(x)===cib&&x._id!==id&&t.type!=="atm");
  const prompt=`You are a senior AML/KYC analyst. Analyze this transaction and entity profile. Respond ONLY in raw JSON.\nENTITY: ${e.name} (${e.businessType}, ${e.type}) | Registered: ${e.ibanCountry}\nTRANSACTION: ${t.id} | ${t.date} | ${t.dir} | €${t.amount} ${t.currency} | ${t.issuer}->${t.receiver} | Counterparty: ${COUNTRY[cc]||cc}(${cc}) | Ref: ${t.ref} | Type: ${t.type}\nFLAGS: Sanctioned:${SANCTIONS.includes(cc)?"YES":"No"} | High-risk:${HIGH_RISK.includes(cc)?"YES":"No"} | Structuring:${t.amount>=9000&&t.amount<=10500?"YES":"No"} | SameIBAN:${same.length}\nJSON: {"risk_level":"critical|high|medium|low","risk_score":0-100,"summary":"2-3 sentences","typologies":["list"],"red_flags":["list"],"profile_inconsistencies":["list"],"recommended_action":"Escalate to MLRO|Request SOW documentation|Monitor|Clear","sar_narrative":"paragraph with [DATE] and [ANALYST NAME] placeholders"}`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:900,messages:[{role:"user",content:prompt}]})});
    const data = await res.json();
    const raw = data.content?.map(b=>b.text||"").join("")||"{}";
    const ai = JSON.parse(raw.replace(/```json|```/g,"").trim());

    // Save to Supabase
    await saveAIResult(t.id, ai);

    // Re-render detail panel with saved result
    selectTxn(id);
  } catch(err) {
    const errBox = right.querySelector(`#ai-result-${id}`);
    if(errBox) errBox.innerHTML=`<div style="padding:12px 15px"><div class="flag-box flag-critical">⚠ Analysis failed — ${err.message}</div></div>`;
    if(btnEl){btnEl.disabled=false;btnEl.textContent="⬡ Run AI Risk Analysis";}
  }
}

function downloadCSV() {
  const h=["id","date","dir","issuer","issuerIban","receiver","receiverIban","amount","currency","ref","status","type"];
  const rows=getFiltered().map(t=>h.map(k=>`"${String(t[k]||"").replace(/"/g,'""')}"`).join(","));
  const blob=new Blob([[h.join(","),...rows].join("\n")],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`${currentEntity}_transactions.csv`; a.click();
}

// ── Boot ─────────────────────────────────────────────────────────────────────
async function init() {
  dbStatus("loading", "⟳ Connecting to database...");
  try {
    await seedIfEmpty();
    await loadFromDB();
    dbStatus("ok", "✓ Database connected");
    setTimeout(() => { const el=document.getElementById("db-status"); if(el) el.style.opacity="0.4"; }, 3000);
    TXN = (TXN_DATA[currentEntity] || []).map(toObj);
    renderBreadcrumb(); renderHeader(); renderTable();
  } catch(e) {
    dbStatus("err", "✗ DB error — check console");
    console.error("Supabase error:", e);
    // Fall back to seed data so the app still works
    ENTITIES = {};
    for (const se of SEED_ENTITIES) {
      ENTITIES[se.id] = { id:se.id, type:se.type, name:se.name, accountId:se.account_id, email:se.email, phone:se.phone, ibanCountry:se.iban_country, address:se.address, addressCountry:se.address_country, joined:se.joined, businessType:se.business_type, monthlyThreshold:se.monthly_threshold, holder:se.holder_id, owns:SEED_ENTITIES.filter(x=>x.holder_id===se.id).map(x=>x.id) };
    }
    TXN_DATA = {};
    for (const [eid, rows] of Object.entries(SEED_TXN)) {
      TXN_DATA[eid] = rows.map(r=>({id:r[0],entity_id:eid,date:r[1],direction:r[2],issuer:r[3],issuer_iban:r[4],receiver:r[5],receiver_iban:r[6],amount:r[7],currency:r[8],reference:r[9],status:r[10],type:r[11]}));
    }
    TXN = (TXN_DATA[currentEntity] || []).map(toObj);
    renderBreadcrumb(); renderHeader(); renderTable();
  }
}

init();
</script>
</body>
</html>
